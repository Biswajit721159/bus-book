spring.application.name=api-getway
server.port=8080

# Target Service URLs (can be overridden by environment variables in production)
services.users.url=http://localhost:6005
services.bus.url=http://localhost:8005

# Eureka Client Configuration
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=${REGISTER_WITH_EUREKA:false}
eureka.client.fetch-registry=${FETCH_REGISTRY:false}

# CORS Configuration
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

# JWT Configuration
jwt.secret=${JWT_SECRET_KEY:TaK+HaV^uvCHEFsEVfypW#7g9^k*Z8$V}
